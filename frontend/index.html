<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Activity Dashboard — Paris Junior College</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="masthead">
    <img src="PJCLogo_Stacked_FullColor_NoLocations.jpg" alt="Paris Junior College">
    <div class="masthead-right">
      <span class="masthead-user" id="mastheadUser"></span>
      <a class="masthead-signout" href="/.auth/logout">Sign out</a>
    </div>
  </div>
  <header class="navbar">
    <button class="back-btn" id="backBtn" onclick="goBack()">‹</button>
    <span class="navbar-title" id="navbarTitle">Faculty Activity Dashboard</span>
    <span class="navbar-meta" id="termLabel"></span>
    <div class="navbar-right">
      <a class="navbar-signout" href="/.auth/logout">Sign out</a>
      <button class="refresh-btn" id="refreshBtn" onclick="loadDashboard()">↺ Refresh</button>
    </div>
  </header>

  <div class="toolbar">
    <span class="toolbar-label">Filter:</span>
    <button class="filter-pill on" data-filter="all"      onclick="setFilter('all')">All</button>
    <button class="filter-pill"    data-filter="inactive" onclick="setFilter('inactive')">Inactive</button>
    <button class="filter-pill"    data-filter="at-risk"  onclick="setFilter('at-risk')">At Risk</button>
    <button class="filter-pill"    data-filter="active"   onclick="setFilter('active')">Active</button>
    <span class="toolbar-right">
      <span id="syncStatus" class="sync-status"></span>
      <span id="lastRefreshed"></span>
    </span>
  </div>

  <div class="main">
    <div class="inst-list" id="instList">
      <div class="empty-state"><div class="spinner"></div><p>Loading instructors...</p></div>
    </div>
    <div class="detail" id="detail">
      <div class="detail-header">
        <h2>Select an instructor</h2>
        <span>Click a name to view course detail</span>
      </div>
      <div class="detail-scroll">
        <div class="empty-state"><p>Course activity will appear here.</p></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
