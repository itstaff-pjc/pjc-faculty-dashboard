name: Deploy Sync Function

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'api-sync/**'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js 18
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        working-directory: api-sync

      - name: Run tests
        run: npm test -- --no-coverage
        working-directory: api-sync

      - name: Login to Azure
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SYNC }}

      - name: Deploy to Azure Functions
        run: |
          cd api-sync
          zip -r ../function-app.zip . --exclude "tests/*"
          az functionapp deploy \
            --name pjc-faculty-sync \
            --resource-group rg-pjc-helpdesk \
            --src-path ../function-app.zip \
            --type zip \
            --async false
